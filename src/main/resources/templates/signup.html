<html xmlns:th="http://www.thymeleaf.org" th:replace="~{base::layout(~{::section})}">

    <head>
        <title>this is home page</title>
    </head>

    <body>
        <section>
            <section class="inner-hero text-center">
                <div class="container">
                    <h1 class="fw-bold mb-2">Create Your Account</h1>
                    <p class="mb-0">Join SmartContactManager and manage all your contacts effortlessly.</p>
                </div>
            </section>
            <section class="auth-section">
                <div class="container">
                    <div class="row justify-content-center">
                        <div class="col-lg-7">
                            <div class="card glass-card p-4 p-md-5">
                                <h4 class="fw-bold mb-1">Sign Up</h4>
                                <div th:if="${message}" th:class="'alert text-center ' + ${message.type}">
                                    <p th:text="${message.content}"></p>
                                </div>
                                <p class="mini-text mb-4">Fill in your details to get started.</p>
                                <form th:action="@{/register}" method="post" th:object="${user}">
                                    <div class="row g-3">
                                        <div class="col-md-6">
                                            <label for="firstName" class="form-label">First Name</label>
                                            <input type="text" name="name" class="form-control" id="firstName" placeholder="John" required>
                                        </div>

                                        <div class="col-md-6">
                                            <label for="signupEmail" class="form-label">Email</label>
                                            <input type="email" class="form-control" name="email" id="signupEmail" placeholder="name@example.com" required>
                                        </div>

                                        <div class="col-md-6">
                                            <label for="signupPassword" class="form-label">Password</label>
                                            <input type="password" class="form-control" name="password" id="signupPassword" placeholder="Create password" required>
                                        </div>

                                        <div class="col-md-6">
                                            <label for="about" class="form-label">About</label>
                                            <textarea name="about" class="form-control" id="about" rows="1" placeholder="Tell us about yourself" required></textarea>
                                        </div>
                                    </div>

                                    <div class="form-check mt-3">
                                        <input class="form-check-input" name="agreement" type="checkbox" id="termsCheck" required>
                                        <label class="form-check-label mini-text" for="termsCheck">
                                            I agree to the Terms & Conditions and Privacy Policy
                                        </label>
                                    </div>
                                    <button type="submit" class="btn page-btn w-100 mt-4">Create Account</button>
                                </form>
                                <p class="text-center mini-text mt-4 mb-0">Already registered? <a th:href="@{/login}" class="text-decoration-none">Login here</a></p>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </section>
    </body>

</html>
