<html xmlns:th="http://www.thymeleaf.org" th:replace="~{base::layout(~{::section})}">

    <head>
        <title>Login Page</title>
        <meta charset="UTF-8">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>

    <body class="bg-light">
        <section>
            <div class="container mt-5">
                <div class="row justify-content-center">
                    <div class="col-md-4">
                        <div class="card shadow">
                            <div class="card-header text-center">
                                <h4>Login Here</h4>
                            </div>
                            <div class="card-body">
                                <!-- Error Message -->
                                <div th:if="${param.error}" class="alert alert-danger"> Invalid Username or Password </div>
                                <!-- Logout Message -->
                                <div th:if="${param.logout}" class="alert alert-success"> You have been logged out successfully! </div>
                                <form id="form-login" class="form" th:action="@{/doLogin}" method="post">
                                    <div class="mb-3">
                                        <label>Email</label>
                                        <input type="text" id="username" name="username" class="form-control" required>
                                    </div>
                                    <div class="mb-3">
                                        <label>Password</label>
                                        <input type="password" id="password" name="password" class="form-control" required>
                                    </div>
                                    <div class="d-grid">
                                        <button type="submit" class="btn btn-primary"> Login </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
           
         </section>
       
        </body>

</html>
