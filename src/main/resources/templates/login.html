<html xmlns:th="http://www.thymeleaf.org" th:replace="~{base::layout(~{::section})}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SmartContactManager</title>
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
            crossorigin="anonymous"
    >
    <link rel="stylesheet" href="style.css">
</head>
<body>


<section class="inner-hero text-center">
    <div class="container">
        <h1 class="fw-bold mb-2">Welcome Back</h1>
        <p class="mb-0">Login to access your contacts, groups, and dashboard insights.</p>
    </div>
</section>

<section class="auth-section">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-5 col-md-8">
                <div class="card glass-card p-4 p-md-5">
                    <h4 class="fw-bold mb-1">Login Account</h4>
                    <div th:if="${param.error}" class="alert alert-danger text-center">
                        Invalid Email or Password ❌
                    </div>

                    <div th:if="${param.logout}" class="alert alert-success text-center">
                        Logout Successfully ✅
                    </div>
                        <p class="mini-text mb-4">Enter your credentials to continue.</p>
                    <form th:action="@{/doLogin}" method="post" >
                        <div class="mb-3">
                            <label for="loginEmail" class="form-label">Email Address</label>
                            <input type="email" class="form-control" name="username" id="loginEmail" placeholder="name@example.com">
                        </div>
                        <div class="mb-3">
                            <label for="loginPassword" class="form-label">Password</label>
                            <input type="password" class="form-control" id="loginPassword" name="password" placeholder="Enter your password">
                        </div>
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="rememberMe">
                                <label class="form-check-label mini-text" for="rememberMe">Remember me</label>
                            </div>
                            <a href="#" class="mini-text text-decoration-none">Forgot password?</a>
                        </div>
                        <button type="submit" class="btn page-btn w-100">Login</button>
                    </form>
                    <p class="text-center mini-text mt-4 mb-0">New user? <a th:href="@{/signup}" class="text-decoration-none">Create account</a></p>
                </div>
            </div>
        </div>
    </div>
</section>
<script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"
></script>
</body>
</html>
