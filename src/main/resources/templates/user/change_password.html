<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{user/user_base :: layout(~{::section})}">


      <head>
          <meta charset="UTF-8">
          <title>Change Password</title>

          <!-- Bootstrap CSS -->
          <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

          <style>
              body {
                  background: linear-gradient(120deg, #2980b9, #6dd5fa);
              }
              .card {
                  border-radius: 15px;
              }
          </style>
      </head>

      <body>
<section>
      <div class="container d-flex justify-content-center align-items-center ">
          
          <div class="card shadow p-4" style="width: 400px;">
              
              <h3 class="text-center mb-4">🔐 Change Password</h3>

              <!-- Success Message -->
              <div th:if="${session.message}" class="alert alert-success text-center">
                  <span th:text="${session.message}"></span>
              </div>

              <!-- Error Message -->
              <div th:if="${session.error}" class="alert alert-danger text-center">
                  <span th:text="${session.error}"></span>
              </div>

              <form th:action="@{/user/change_password}" method="post">

                  <div class="mb-3">
                      <label class="form-label">Current Password</label>
                      <input type="password" name="oldPassword" class="form-control" placeholder="Enter current password" required>
                  </div>

                  <div class="mb-3">
                      <label class="form-label">New Password</label>
                      <input type="password" name="newPassword" class="form-control" placeholder="Enter new password" required>
                  </div>

                  <div class="mb-3">
                      <label class="form-label">Confirm Password</label>
                      <input type="password" name="confirmPassword" class="form-control" placeholder="Confirm new password" required>
                  </div>

                  <button type="submit" class="btn btn-primary w-100">Update Password</button>
              </form>

              <div class="text-center mt-3">
                  <a href="/user/user_dashboard" class="text-decoration-none">⬅ Back to Dashboard</a>
              </div>

          </div>

      </div>
      </section>
      </body>
      </html>
