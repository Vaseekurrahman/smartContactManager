<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{user/user_base :: layout(~{::section})}">

<body>
<section>
    <div class="container mt-5 d-flex justify-content-center mb-5">
        <div class="card shadow-lg p-4" style="width: 400px; border-radius: 15px;">

            <div class="text-center">
                <img th:if="${contact != null}"
                     th:src="@{'/images/' + ${contact.image}}"
                     alt="profile"
                     class="rounded-circle shadow"
                     style="width: 120px; height: 120px; object-fit: cover; border: 3px solid #0d6efd;" />

                <h4 class="mt-3 fw-bold text-primary">
                    <span th:text="${contact.name}"></span>
                    <small class="text-muted">(<span th:text="${contact.secondName}"></span>)</small>
                </h4>
            </div>

            <hr>

            <div class="mt-3">
                <p><strong>Email:</strong> <span th:text="${contact.email}"></span></p>
                <p><strong>Phone:</strong> <span th:text="${contact.phone}"></span></p>
                <p><strong>Work:</strong> <span th:text="${contact.work}"></span></p>
                <p><strong>Description:</strong></p>
                <p class="text-muted" th:utext="${contact.description}"></p>
            </div>

            <div class="d-flex justify-content-between mt-4">
                <a th:href="@{'/user/delete/'+${contact.cId}}">
                    <button onclick="return confirm('Are you sure want to delete the contact')"
                            class="btn btn-danger px-3">
                        Delete
                    </button>
                </a>

                <form method="post" th:action="@{'/user/update_details/'+${contact.cId}}">
                    <button type="submit" class="btn btn-warning px-3 text-white">
                        Update
                    </button>
                </form>
            </div>

        </div>
    </div>
</section>
</body>
</html>
