<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{user/user_base :: layout(~{::section})}">

    <head>
    </head>

    <body>
        <section class="">
            <div class="card mycard" style="width: 45%;">
                <div class="card-body ">
                    <div class="container text-center">
                        <img th:if="${contact != null}"
                             th:src="@{'/images/' + ${contact.image}}"
                             alt="profile"/>
                        <h3 class="mt-3"><span th:text="${contact.name}"></span>(<span th:text="${contact.secondName}"></span>)</h3>
                        <div> <span class="fs-4 fw-bold"> Email:</span> <span th:text="${contact.email}"></span> </div>
                        <div> <span class="fs-4 fw-bold">phone: </span><span th:text="${contact.phone}"></span></div>
                        <div> <span class="fs-4 fw-bold">Description: </span><span th:utext="${contact.description}"></span></div>
                        <div> <span class="fs-4 fw-bold">work: </span><span th:text="${contact.work}"></span></div>
                        <div class="container">
                     <a th:href="@{'/user/delete/'+${contact.cId}}"><button onclick="return confirm('Are you sure want to delete the contact')" class="btn btn-danger btn-sm rm-2">Delete</button>
                        </a> 
                          <form method="post" th:action="@{'/user/update_details/'+${contact.cId}}">
                          <button type="submit" class="btn btn-warning btn-sm">update</button>
 </form>

                        </div>
                    </div>
                </div>
            </div>
        </section>
    </body>

</html>
